<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Color.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 480px;
            text-align: center;
        }
        .app-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 2.5rem;
        }
        .headline {
            font-size: 1.125rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.7;
            margin-bottom: 3rem;
        }
        .contact-link {
            display: inline-block;
            color: #fafafa;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.875rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 980px;
            transition: all 0.25s ease;
        }
        .contact-link:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }
        .response-note {
            margin-top: 2.5rem;
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.25);
            line-height: 1.6;
        }
        .back {
            position: fixed;
            top: 2rem;
            left: 2rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s ease;
        }
        .back:hover { color: rgba(255, 255, 255, 0.7); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr;</a>
    <div class="container">
        <h1 class="app-name">Color.</h1>
        <p class="headline">Something not working as expected?<br>We'd love to hear from you.</p>
        <a href="mailto:support@pears-studio.com" class="contact-link">support@pears-studio.com</a>
        <p class="response-note">We typically respond within 48 hours.</p>
    </div>
</body>
</html>
